server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy images from the VPS to avoid Mixed Content (HTTPS -> HTTP)
    location /external-images {
        # The trailing slash in proxy_pass strips the "/external-images" part
        proxy_pass http://31.97.24.35:8081/;
        
        # Do NOT set Host to $host, let it use the IP/Port from proxy_pass
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering off;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        
        # Handle potential redirects from the VPS
        proxy_redirect off;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
