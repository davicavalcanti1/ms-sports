server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy images from the VPS to avoid Mixed Content (HTTPS -> HTTP)
    # ^~ garante prioridade máxima sobre o bloco regex abaixo
    location ^~ /external-images/ {
        proxy_pass http://31.97.24.35:8081/;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 90;
        proxy_connect_timeout 90;
        proxy_redirect off;
    }

    # Arquivos estáticos da pasta public/ (stadium.jpg, logos, etc.)
    # try_files garante que o arquivo é servido direto do disco;
    # se não existir, retorna 404 (nunca cai no SPA fallback)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # SPA fallback — todas as outras rotas entregam o index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
